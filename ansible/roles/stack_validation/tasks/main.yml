  delay: "{{ stack_validation_delay }}"
  until: kafka_broker_port_check.rc == 0
  when:
    - kafka_enabled | default(true)
    - start_kafka_services
    - inventory_hostname in groups.get('kafka_broker', [])

- name: Validate HDFS command path
  ansible.builtin.command: "{{ hadoop_home }}/bin/hdfs dfs -ls /"
  become_user: "{{ data_platform_user }}"
  register: hdfs_ls
  changed_when: false
  retries: 15
  delay: 4
  until: hdfs_ls.rc == 0
  when:
    - start_hadoop_services
    - groups.get('hadoop_namenode', []) | length > 0
    - inventory_hostname == (groups.get('hadoop_namenode', []) | first)

- name: Validate YARN node registration
  ansible.builtin.command: "{{ hadoop_home }}/bin/yarn node -list"
  become_user: "{{ data_platform_user }}"
  register: yarn_nodes
  changed_when: false
  retries: 15
  delay: 4
  until:
    - yarn_nodes.rc == 0
    - "'Total Nodes:' in yarn_nodes.stdout"
  when:
    - start_hadoop_services
    - groups.get('hadoop_namenode', []) | length > 0
    - inventory_hostname == (groups.get('hadoop_namenode', []) | first)

- name: Assert at least one YARN NodeManager is registered
  ansible.builtin.assert:
    that:
      - yarn_nodes.stdout is regex('(?s).*Total Nodes:\\s*[1-9][0-9]*.*')
    fail_msg: "YARN is up but no NodeManager is registered."
  when:
    - start_hadoop_services
    - groups.get('hadoop_datanode', []) | length > 0
    - groups.get('hadoop_namenode', []) | length > 0
    - inventory_hostname == (groups.get('hadoop_namenode', []) | first)

- name: Validate Hive query execution via Beeline
  ansible.builtin.command:
    argv:
      - "{{ hive_home }}/bin/beeline"
      - "-u"
      - "{{ stack_validation_hive_jdbc_url }}"
      - "-n"
      - "{{ stack_validation_hive_jdbc_user }}"
      - "-e"
      - "show databases;"
  become_user: "{{ data_platform_user }}"
  register: hive_db_check
  changed_when: false
  retries: 10
  delay: 5
  until: hive_db_check.rc == 0
  when:
    - hive_enabled | default(true)
    - start_hive_services
    - groups.get('hadoop_edge', []) | length > 0
    - inventory_hostname == (groups.get('hadoop_edge', []) | first)

- name: Validate Kafka broker command
  ansible.builtin.command: "{{ kafka_home }}/bin/kafka-topics.sh --bootstrap-server {{ kafka_bootstrap_server }} --list"
  register: kafka_topics
  changed_when: false
  retries: 10
  delay: 4
  until: kafka_topics.rc == 0
  when:
    - kafka_enabled | default(true)
    - start_kafka_services
    - groups.get('kafka_broker', []) | length > 0
    - inventory_hostname == (groups.get('kafka_broker', []) | first)
