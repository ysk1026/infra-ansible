---
- name: Skip stack validation when disabled
  ansible.builtin.meta: end_role
  when: not stack_validation_enabled

- name: Wait for NameNode RPC port listener
  ansible.builtin.shell: |
    ss -H -ltn | awk '$4 ~ /:{{ hdfs_rpc_port }}$/ {found=1} END {exit(found?0:1)}'
  args:
    executable: /bin/bash
  register: nn_rpc_port_check
  changed_when: false
  retries: "{{ ((stack_validation_timeout | int) / (stack_validation_delay | int)) | round(0, 'ceil') | int }}"
  delay: "{{ stack_validation_delay }}"
  until: nn_rpc_port_check.rc == 0
  when:
    - start_hadoop_services
    - inventory_hostname in groups.get('hadoop_namenode', [])

- name: Wait for NameNode web port listener
  ansible.builtin.shell: |
    ss -H -ltn | awk '$4 ~ /:{{ namenode_web_port }}$/ {found=1} END {exit(found?0:1)}'
  args:
    executable: /bin/bash
  register: nn_web_port_check
