---
- name: Skip Impala when disabled
  ansible.builtin.meta: end_role
  when: not impala_enabled

- name: Skip Impala on non-target hosts
  ansible.builtin.meta: end_role
  when: inventory_hostname not in (groups.get('impala_catalog', []) + groups.get('impala_daemon', []))

- name: Ensure Impala artifact directory exists
  ansible.builtin.stat:
    path: "{{ impala_artifact_dir }}"
  register: impala_artifact_dir_stat

- name: Fail when Impala artifact directory is missing
  ansible.builtin.fail:
    msg: "Missing local Impala artifact dir: {{ impala_artifact_dir }}"
  when: not impala_artifact_dir_stat.stat.exists

- name: Resolve Impala major.minor selector
  ansible.builtin.set_fact:
    impala_major_minor: "{{ impala_version | regex_replace('^([0-9]+\\.[0-9]+).*$','\\1') }}"

- name: Pick Impala deb package from local artifacts
  ansible.builtin.shell: |
    set -o pipefail
    ls -1 "{{ impala_artifact_dir }}"/*.deb 2>/dev/null \
      | grep -E '/[^/]*impala[^/]*{{ impala_major_minor | replace(".", "\\.") }}([._-][0-9]+)?[^/]*{{ impala_target_os_tag }}[^/]*{{ impala_target_arch }}[^/]*\.deb$' \
      | sort -V \
      | tail -n 1
  args:
    executable: /bin/bash
  register: impala_deb
  changed_when: false
  failed_when: false

- name: Fail when matching Impala deb is not found
  ansible.builtin.fail:
    msg: "No Impala deb matching major.minor={{ impala_major_minor }}, os={{ impala_target_os_tag }}, arch={{ impala_target_arch }} in {{ impala_artifact_dir }}"
  when: impala_deb.stdout | trim == ''

- name: Install Impala from local deb
  ansible.builtin.apt:
    deb: "{{ impala_deb.stdout | trim }}"

- name: Collect service facts
  ansible.builtin.service_facts:

- name: Start Impala services when present
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
    state: started
  loop: "{{ impala_service_candidates }}"
  when:
    - start_impala_services
    - item + '.service' in ansible_facts.services
